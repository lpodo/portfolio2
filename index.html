  var xTickIdxs = [0, Math.floor(n/3), Math.floor(2*n/3), n-1].filter(function(v,i,a){ return a.indexOf(v)===i; });
  var svgXTicks = xTickIdxs.map(function(i) {
    var d = new Date(timestamps[i] * 1000);
    return '<text x="' + xp(i,n) + '" y="' + (H-padB+14) + '" text-anchor="middle" font-size="9" fill="#6a7a8a" font-family="monospace">' + pad2(d.getUTCDate()) + '/' + pad2(d.getUTCMonth()+1) + '</text>';
  }).join('');
  var svgLines = lines.map(function(l) {
    var pts = l.values.map(function(v,i) { return xp(i,l.values.length) + ',' + yp(v); }).join(' ');
    return '<polyline points="' + pts + '" fill="none" stroke="' + l.color + '" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>';
  }).join('');
  var legend = '<div style="display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:6px">'
    + lines.map(function(l) { var last = l.values[l.values.length-1]; return '<span style="font-size:10px;color:' + l.color + '">' + l.name + ' ' + (last>=0?'+':'') + last.toFixed(2) + '%</span>'; }).join('')
    + '</div>';
  el.innerHTML = '<div style="display:flex;flex-direction:column">'
    + '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">' + svgYTicks + zeroLine + svgLines + svgXTicks + '</svg>'
    + legend
    + '</div>';
}


function updateViewMenuBtn() {
  var btn = document.getElementById('viewMenuBtn');
  if (!btn) return;
  var labels = { 'main': 'P&L', 'weight': 'WEIGHT', 'market': 'MARKET', 'chart': 'CHART', 'analytics': 'ANALYTICS',
    'summary': 'P&L', 'summary-market': 'MARKET', 'summary-chart': 'CHART', 'summary-analytics': 'ANALYTICS' };
  var label = labels[viewMode] || 'P&L';
  if (viewMode === 'main' && currentPortfolio() && currentPortfolio().watchlist) label = 'MARKET';
  btn.textContent = label;
}

function render() {
  updateViewMenuBtn();
  var stockForm = document.getElementById('stockAddForm');
  if (stockForm) stockForm.style.display = (viewMode === 'bonds') ? 'none' : '';
  var area = document.getElementById('tableArea');

  // Analytics view (single portfolio)
  if (viewMode === 'analytics') {
    var aBase = (currentPortfolio().currencyCode || 'USD').toUpperCase();
    var aBaseSym = CURRENCY_SYMBOLS[aBase] || aBase;
    var aNonUSD = [];
    positions.forEach(function(p) {
      var pc = getPositionCurrencyCode(p);
      if (pc !== aBase && aNonUSD.indexOf(pc) === -1) aNonUSD.push(pc);
    });
    var aFxMap = {};
    function renderAnalytics(fxMap) {
      area.innerHTML = buildAnalyticsView(positions, aBaseSym, aBase, fxMap, false);
    }
    if (aNonUSD.length === 0) {
      renderAnalytics({});
    } else {
      var aBaseUrl = getApiKey() ? getApiKey().replace(/\/+$/, '') : '';
      var aToken = getToken();
      Promise.all(aNonUSD.map(function(code) {
        return fetchFxRate(aBaseUrl, aToken, code + aBase + '=X').then(function(rate) {
          if (rate) { aFxMap[code + aBase] = rate; aFxMap[code] = rate; }
        });
      })).then(function() { renderAnalytics(aFxMap); });
    }
    return;
  }

  // Summary analytics view
  if (viewMode === 'summary-analytics') {
    var saNonUSD = [];
    var saPids = Object.keys(portfolios).filter(function(pid) { return !portfolios[pid].watchlist && !portfolios[pid].archive; });
    var allSaPos = [];
    saPids.forEach(function(pid) {
      (portfolios[pid].positions || []).forEach(function(pos) {
        allSaPos.push(pos);
        var pc = getPositionCurrencyCode(pos);
        if (pc !== 'USD' && saNonUSD.indexOf(pc) === -1) saNonUSD.push(pc);
      });
    });
    var saFxMap = {};
    function renderSummaryAnalytics(fxMap) {
      area.innerHTML = buildAnalyticsView(allSaPos, '$', 'USD', fxMap, true);
    }
    if (saNonUSD.length === 0) {
      renderSummaryAnalytics({});
    } else {
      var saBaseUrl = getApiKey() ? getApiKey().replace(/\/+$/, '') : '';
      var saToken = getToken();
      Promise.all(saNonUSD.map(function(code) {
        return fetchFxRate(saBaseUrl, saToken, code + 'USD=X').then(function(rate) {
          if (rate) { saFxMap[code + 'USD'] = rate; saFxMap[code] = rate; }
        });
      })).then(function() { renderSummaryAnalytics(saFxMap); });
    }
    return;
  }

  // Summary chart view
  if (viewMode === 'summary-chart') {
    var scRange2 = window.chartRange || '1mo';
    var scMode2 = window.summaryChartMode || 'total';
    area.innerHTML = '<div style="padding:8px 0 4px;display:flex;gap:6px;flex-wrap:wrap">'
      + ['1mo','3mo','6mo'].map(function(r) {
          var active = scRange2 === r;
          return '<button onclick="setSummaryChartRange(&apos;' + r + '&apos;)" style="font-size:9px;letter-spacing:1px;padding:4px 10px;border:1px solid ' + (active ? 'var(--green)' : 'var(--border)') + ';background:' + (active ? 'var(--bg2)' : 'var(--bg)') + ';color:' + (active ? 'var(--green)' : 'var(--dim)') + ';cursor:pointer;font-family:var(--font)">' + r.toUpperCase() + '</button>';
        }).join('')
      + '<div style="flex:1"></div>'
      + '<button onclick="setSummaryChartMode(&apos;total&apos;)" style="font-size:9px;letter-spacing:1px;padding:4px 10px;border:1px solid ' + (scMode2==='total' ? 'var(--green)' : 'var(--border)') + ';background:' + (scMode2==='total' ? 'var(--bg2)' : 'var(--bg)') + ';color:' + (scMode2==='total' ? 'var(--green)' : 'var(--dim)') + ';cursor:pointer;font-family:var(--font)">TOTAL</button>'
      + '<button onclick="setSummaryChartMode(&apos;byportfolio&apos;)" style="font-size:9px;letter-spacing:1px;padding:4px 10px;border:1px solid ' + (scMode2==='byportfolio' ? 'var(--green)' : 'var(--border)') + ';background:' + (scMode2==='byportfolio' ? 'var(--bg2)' : 'var(--bg)') + ';color:' + (scMode2==='byportfolio' ? 'var(--green)' : 'var(--dim)') + ';cursor:pointer;font-family:var(--font)">BY PORTFOLIO</button>'
      + '</div>'
      + '<div id="chartArea" style="min-height:200px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:11px">Loading...</div>';
    loadSummaryChartData(scRange2, scMode2);
    return;
  }

  if (positions.length === 0) {
    area.innerHTML = '<div class="empty">NO POSITIONS &mdash; ADD ONE BELOW</div>';
    return;
  }

  var rows = '';
  getSorted().forEach(function(p) {
    var pnl = (p.current !== null && p.current !== undefined) ? p.current - p.entry : null;
    var pnlPct = (pnl !== null && p.entry && p.entry > 0) ? (pnl / p.entry) * 100 : null;
    if (p.qty === 0 || !p.entry) pnl = null;
    if (p.qty === 0 && !p.entry) pnlPct = null;
    var isLoading = !!loadingSet[p.id];
    var isEdit = editId === p.id;

    var curCell;
    if (isLoading) {
      curCell = '<span class="muted">...</span>';
    } else if (p.fetchErr) {
      curCell = '<button class="fetch-btn" style="color:var(--red);border-color:var(--red)" onclick="refreshPrice(' + p.id + ')">ERR ↻</button>';
    } else if (p.current !== null && p.current !== undefined) {
      curCell = getPositionCurrencySymbol(p) + f2(p.current);
    } else {
      curCell = '<button class="fetch-btn" onclick="refreshPrice(' + p.id + ')">FETCH</button>';
    }

    var qtyCell = isEdit ? '<input class="edit-input" id="editQty" type="number" value="' + p.qty + '">' : (p.qty === 0 ? '<span style="color:var(--dim)">&mdash;</span>' : (Number.isInteger(p.qty) ? p.qty : p.qty.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:4})));
    var entryCell = isEdit ? '<input class="edit-input" id="editEntry" type="number" value="' + p.entry + '">' : (p.entry === 0 && p.qty === 0 ? '<span class="muted">&mdash;</span>' : getPositionCurrencySymbol(p) + f2(p.entry));
    var curEditCell = isEdit
      ? '<input class="edit-input" id="editCurrent" type="number" value="' + (p.current !== null && p.current !== undefined ? p.current : '') + '" placeholder="&mdash;">'
      : curCell;

    var actions = isEdit
      ? '<button class="btn-icon" style="color:var(--green)" onclick="saveEdit(' + p.id + ')">&#10003;</button>'
        + '<button class="btn-icon" onclick="cancelEdit()">&#10005;</button>'
      : (p.sold ? '<button class="btn-icon" onclick="showArchiveMenu(' + p.id + ', this)" title="Move to archive" style="font-size:14px;padding:0 4px">&#8863;</button>' : (p.qty > 0 ? '<button class="btn-icon" style="font-size:9px;letter-spacing:1px;padding:0 4px;color:var(--bright)" onclick="sellPosition(' + p.id + ')">SELL</button>' : ''))
      + '<button class="btn-icon" onclick="showMoveMenu(' + p.id + ', this)" title="Move to portfolio" style="font-size:17px;padding:0 4px;line-height:1">&#8680;</button>'
        + '<button class="btn-icon" onclick="startEdit(' + p.id + ')">&#9998;</button>'
        + '<button class="btn-icon" onclick="removePosition(' + p.id + ')">&#10005;</button>';

    var tickerCell = isEdit ? '<input class="edit-input" id="editTicker" type="text" value="' + p.ticker + '" style="width:60px;text-transform:uppercase">' : p.ticker;
    var soldStyle = (p.sold || p.qty === 0) ? 'font-style:italic;opacity:0.5' : '';
    rows += '<tr style="' + soldStyle + '">'
      + '<td>' + tickerCell + '</td>'
      + '<td>' + qtyCell + '</td>'
      + '<td>' + entryCell + '</td>'
      + '<td>' + curEditCell + '</td>'
      + '<td class="' + cls(pnl) + '">' + (p.qty === 0 ? '<span style="color:var(--dim)">&mdash;</span>' : fSign(pnl !== null ? pnl * p.qty : null)) + '</td>'
      + '<td class="' + cls(pnlPct) + '">' + fPct(pnlPct) + '</td>'
      + '<td style="width:16px;padding:0 2px;text-align:center">' + (p.sold ? '<span style="color:#7090b0;font-size:13px">&#8960;</span>' : marketIcon(p.marketState)) + '</td>'
      + '<td style="white-space:nowrap">' + actions + '</td>'
      + '</tr>'
      + (isEdit ? '<tr><td colspan="8" style="padding:6px 4px 10px;background:var(--bg2)">'
        + '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">'
        + '<div class="field"><label>CATEGORY</label><input type="text" id="editCategory" value="' + (p.category || '') + '" placeholder="e.g. AI &amp; Semi" style="width:100px" autocomplete="off" autocorrect="off"></div>'
        + '<div class="field"><label>REGION</label><input type="text" id="editRegion" value="' + (p.region || '') + '" placeholder="e.g. US" style="width:70px" autocomplete="off" autocorrect="off"></div>'
        + '<div class="field"><label>SECTOR</label><input type="text" id="editSector" value="' + (p.sector || '') + '" placeholder="e.g. Technology" style="width:110px" autocomplete="off" autocorrect="off"></div>'
        + '</div></td></tr>'
        : '');
  });

  var totCost = 0, totVal = 0, hasAny = false;
  var baseCode = (currentPortfolio().currencyCode || 'USD').toUpperCase();
  var baseSym = getCurrency();
  // Get unique non-base currencies in this portfolio
  var posFxNeeded = [];
  positions.forEach(function(p) {
    var pc = getPositionCurrencyCode(p);
    if (p.current != null && pc !== baseCode && posFxNeeded.indexOf(pc) === -1) posFxNeeded.push(pc);
  });

  function buildTotals(fxMap) {
    var tCost = 0, tVal = 0, tHas = false;
    positions.forEach(function(p) {
      if (p.current !== null && p.current !== undefined) {
        var rate = 1;
        var pc = getPositionCurrencyCode(p);
        if (pc !== baseCode) rate = fxMap[pc + baseCode] || fxMap[pc] || 1;
        tCost += p.qty * p.entry * rate;
        tVal += p.qty * p.current * rate;
        tHas = true;
      }
    });
    return { cost: tCost, val: tVal, has: tHas };
  }

  function renderTotals(fxMap) {
    var t = buildTotals(fxMap);
    totVal = t.val; totCost = t.cost; hasAny = t.has;
    var totPnL = totVal - totCost;
    var totPct = totCost ? (totPnL / totCost) * 100 : null;
    var totalsHtml = '';
    if (hasAny) {
      var c = totPnL >= 0 ? 'pos' : 'neg';
      totalsHtml = '<div class="totals-bar">'
        + '<div class="total-block"><div class="total-label">VALUE</div><div class="total-value" style="color:var(--bright)">' + baseSym + f2(totVal) + '</div></div>'
        + '<div class="total-block"><div class="total-label">P&amp;L</div><div class="total-value ' + c + '">' + fSign(totPnL) + '</div></div>'
        + '<div class="total-block"><div class="total-label">RETURN</div><div class="total-value ' + c + '">' + fPct(totPct) + '</div></div>'
        + '</div>';
    }
    return totalsHtml;
  }

  var totalsHtml = '';

  // Archive summary view
  if (viewMode === 'archive-summary') {
    var archFxRates = {};
    var archNonUSD = [];
    var archPids = Object.keys(portfolios).filter(function(pid) { return portfolios[pid].archive; }).sort(function(a, b) { return portfolios[a].name.localeCompare(portfolios[b].name); });
    archPids.forEach(function(pid) {
      (portfolios[pid].positions || []).forEach(function(pos) {
        var c = pos.currency || portfolios[pid].currencyCode || 'USD';
        if (c !== 'USD' && archNonUSD.indexOf(c) === -1) archNonUSD.push(c);
      });
    });

    function buildArchPortfolioStats() {
      return archPids.map(function(pid) {
        var p = portfolios[pid];
        var baseCur = (p.currencyCode || 'USD').toUpperCase();
        var valUSD = 0, costUSD = 0, valBase = 0, costBase = 0, hasAny = false;
        (p.positions || []).forEach(function(pos) {
          if (pos.current != null && pos.qty > 0) {
            var posCur = pos.currency || baseCur;
            var rateToUSD = posCur === 'USD' ? 1 : (archFxRates[posCur] || 1);
            valUSD += pos.qty * pos.current * rateToUSD;
            costUSD += pos.qty * pos.entry * rateToUSD;
            var rateBaseToUSD = baseCur === 'USD' ? 1 : (archFxRates[baseCur] || 1);
            valBase += pos.qty * pos.current * rateToUSD / rateBaseToUSD;
            costBase += pos.qty * pos.entry * rateToUSD / rateBaseToUSD;
            hasAny = true;
          }
        });
        return {
          id: pid, name: p.name,
          currency: CURRENCY_SYMBOLS[baseCur] || baseCur,
          currencyCode: baseCur,
          val: hasAny ? valBase : null, cost: hasAny ? costBase : null,
          valUSD: hasAny ? valUSD : null, costUSD: hasAny ? costUSD : null
        };
      });
    }

    var archPortfolioStats = [];

    function renderArchiveSummary() {
      var totalValUSD = 0, totalCostUSD = 0;
      archPortfolioStats.forEach(function(s) {
        if (s.valUSD !== null) { totalValUSD += s.valUSD; totalCostUSD += s.costUSD; }
      });
      var summaryRows = '';
      archPortfolioStats.forEach(function(s) {
        var pnl = s.val !== null ? s.val - s.cost : null;
        var ret = (pnl !== null && s.cost) ? pnl / s.cost * 100 : null;
        var weight = (s.valUSD !== null && totalValUSD > 0) ? s.valUSD / totalValUSD * 100 : null;
        var c = pnl === null ? '' : (pnl >= 0 ? 'pos' : 'neg');
        summaryRows += '<tr style="cursor:pointer" onclick="switchPortfolio(&apos;' + s.id + '&apos;)">'
          + '<td style="text-align:left">' + s.name + '</td>'
          + '<td>' + (s.val !== null ? (CURRENCY_SYMBOLS[s.currencyCode] || s.currencyCode) + f2(s.val) : '&mdash;') + '</td>'
          + '<td class="' + c + '">' + (pnl !== null ? fSign(pnl) : '&mdash;') + '</td>'
          + '<td class="' + c + '">' + (ret !== null ? fPct(ret) : '&mdash;') + '</td>'
          + '<td>' + (weight !== null ? fPctNoSign(weight) : '&mdash;') + '</td>'
          + '</tr>';
      });
      var totPnL = totalValUSD - totalCostUSD;
      var totRet = totalCostUSD ? totPnL / totalCostUSD * 100 : null;
      var c = totPnL >= 0 ? 'pos' : 'neg';
      area.innerHTML = '<div class="table-wrap"><table>'
        + '<thead><tr>'
        + '<th style="text-align:left;padding:5px 4px;font-size:9px;color:var(--dim);letter-spacing:1px;border-bottom:1px solid var(--border)">PORTFOLIO</th>'
        + '<th style="text-align:right;padding:5px 4px;font-size:9px;color:var(--dim);letter-spacing:1px;border-bottom:1px solid var(--border)">VALUE</th>'
        + '<th style="text-align:right;padding:5px 4px;font-size:9px;color:var(--dim);letter-spacing:1px;border-bottom:1px solid var(--border)">P&amp;L</th>'
        + '<th style="text-align:right;padding:5px 4px;font-size:9px;color:var(--dim);letter-spacing:1px;border-bottom:1px solid var(--border)">RETURN</th>'
        + '<th style="text-align:right;padding:5px 4px;font-size:9px;color:var(--dim);letter-spacing:1px;border-bottom:1px solid var(--border)">WEIGHT</th>'
        + '</tr></thead>'
        + '<tbody>' + summaryRows + '</tbody>'
        + '</table></div>'
        + '<div class="totals-bar">'
        + '<div class="total-block"><div class="total-label">TOTAL VALUE</div><div class="total-value" style="color:var(--bright)">$' + f2(totalValUSD) + '</div></div>'
        + '<div class="total-block"><div class="total-label">P&amp;L</div><div class="total-value ' + c + '">' + fSign(totPnL) + '</div></div>'
        + '<div class="total-block"><div class="total-label">RETURN</div><div class="total-value ' + c + '">' + (totRet !== null ? fPct(totRet) : '&mdash;') + '</div></div>'
        + '</div>';
    }

    if (archNonUSD.length === 0) {
      archPortfolioStats = buildArchPortfolioStats();
      renderArchiveSummary();
    } else {
      var baseUrl4 = getApiKey() ? getApiKey().replace(/\/+$/, '') : '';
      var token4 = getToken();
      var archFxP = archNonUSD.map(function(code) {
        return fetchFxRate(baseUrl4, token4, code + 'USD=X').then(function(rate) {
          if (rate) archFxRates[code] = rate;
        });
      });
      Promise.all(archFxP).then(function() {
        archPortfolioStats = buildArchPortfolioStats();
        renderArchiveSummary();
      });
    }
    return;
  }

  // Bonds portfolio view
  if (viewMode === 'bonds') {
    bondPortfolios = getBondPortfolios();
    bondsDb = getBondsDb();
    var bp = bondPortfolios[currentBondPortfolioId];
    if (!bp) { area.innerHTML = '<div style="color:var(--dim);padding:20px">Select a bond portfolio</div>'; return; }

    // Calculations
    function calcCouponsRemaining(purchaseDate, maturityDate, couponFrequency) {
      var maturity = new Date(maturityDate);
      var purchase = new Date(purchaseDate);
      var count = 0;
      // Step back from maturity by coupon interval
      var intervalMonths = Math.round(12 / couponFrequency);
      var d = new Date(maturity);
      while (d > purchase) {
        count++;
        d.setMonth(d.getMonth() - intervalMonths);
      }
      return count;
    }

    function calcBondPosition(pos) {
      var bond = bondsDb.find(function(b) { return b.id === pos.bondId; });
      if (!bond) return null;
      var dirtyPrice = pos.cleanPrice / 100 * bond.parValue + pos.accruedInterest;
      var positionValue = pos.qty * dirtyPrice;
      var couponPrice = bond.parValue * bond.nominalYield / bond.couponFrequency;
      var couponsLeft = calcCouponsRemaining(pos.purchaseDate, bond.maturityDate, bond.couponFrequency);
      var totalCouponIncome = couponPrice * couponsLeft;
      var profitPerBond = totalCouponIncome + bond.parValue - dirtyPrice;
      var totalProfit = profitPerBond * pos.qty;
      var profitPct = positionValue > 0 ? profitPerBond / dirtyPrice * 100 : null;
      // Annual yield: days from purchase to maturity
      var purchaseD = new Date(pos.purchaseDate);
      var maturityD = new Date(bond.maturityDate);
      var daysHeld = (maturityD - purchaseD) / (1000 * 60 * 60 * 24);
      var annualYield = (daysHeld > 0 && profitPct !== null) ? profitPct / daysHeld * 365 : null;
      var currSym = CURRENCY_SYMBOLS[bond.currency] || bond.currency;
      return { bond: bond, dirtyPrice: dirtyPrice, positionValue: positionValue, totalProfit: totalProfit, profitPct: profitPct, annualYield: annualYield, couponsLeft: couponsLeft, currSym: currSym };
    }

    var today = new Date(); today.setHours(0,0,0,0);
    var sortedPositions = (bp.positions || []).slice().sort(function(a, b) {
      var bondA = bondsDb.find(function(x) { return x.id === a.bondId; });
      var bondB = bondsDb.find(function(x) { return x.id === b.bondId; });
      var dateA = bondA ? new Date(bondA.maturityDate) : new Date(0);
      var dateB = bondB ? new Date(bondB.maturityDate) : new Date(0);
      return dateA - dateB;
    });
    var rows = '';
    var totValueActive = 0, totProfitActive = 0;
    var totValueMatured = 0, totProfitMatured = 0;
    sortedPositions.forEach(function(pos) {
      var calc = calcBondPosition(pos);
      if (!calc) {
        rows += '<tr><td style="text-align:left">' + (pos.bondName || '?') + '</td><td colspan="7" style="color:var(--red);font-size:10px">Bond not in DB</td></tr>';
        return;
      }
      totValue += calc.positionValue;
      totProfit += calc.totalProfit;
      var isMatured = new Date(calc.bond.maturityDate) <= today;
      var rowStyle = isMatured ? 'font-style:italic;opacity:0.5' : '';
      if (isMatured) { totValueMatured += calc.positionValue; totProfitMatured += calc.totalProfit; }
      else { totValueActive += calc.positionValue; totProfitActive += calc.totalProfit; }
      var pClass = calc.totalProfit >= 0 ? 'pos' : 'neg';
      rows += '<tr style="' + rowStyle + '">'
        + '<td style="text-align:left;cursor:pointer;white-space:nowrap" onclick="openBondDetailById(&apos;' + calc.bond.id + '&apos;)">' + calc.bond.name + '</td>'
        + '<td style="white-space:nowrap">' + pos.purchaseDate + '</td>'
        + '<td>' + pos.qty + '</td>'
        + '<td>' + f2(pos.cleanPrice) + '%</td>'
        + '<td>' + calc.currSym + f2(pos.accruedInterest) + '</td>'
        + '<td>' + calc.currSym + f2(calc.positionValue) + '</td>'
        + '<td class="' + pClass + '">' + calc.currSym + fSign(calc.totalProfit) + '</td>'
        + '<td class="' + pClass + '">' + (calc.profitPct !== null ? fSign(calc.profitPct) + '%' : '—') + '</td>'
        + '<td class="' + pClass + '">' + (calc.annualYield !== null ? fSign(calc.annualYield) + '%' : '—') + '</td>'
        + '<td style="white-space:nowrap">'
          + '<button class="btn-icon" onclick="editBondPosition(&apos;' + pos.id + '&apos;)">&#9998;</button>'
          + '<button class="btn-icon" onclick="deleteBondPosition(&apos;' + pos.id + '&apos;)" style="color:var(--red)">&#10005;</button>'
        + '</td>'
        + '</tr>';
    });

    var totValue = totValueActive + totValueMatured;
    var totProfit = totProfitActive + totProfitMatured;
    var getBondCurrSym = function() {
      for (var i = 0; i < sortedPositions.length; i++) {
        var b = bondsDb.find(function(x) { return x.id === sortedPositions[i].bondId; });
        if (b) return CURRENCY_SYMBOLS[b.currency] || b.currency;
      }
      return '$';
    };

        + '<div style="display:flex;gap:8px;margin-bottom:8px">'
        + '<button onclick="chartSelectAll()" style="font-size:9px;letter-spacing:1px;padding:3px 8px;border:1px solid var(--border);background:var(--bg);color:var(--dim);cursor:pointer;font-family:var(--font)">ALL</button>'
        + '<button onclick="chartSelectNone()" style="font-size:9px;letter-spacing:1px;padding:3px 8px;border:1px solid var(--border);background:var(--bg);color:var(--dim);cursor:pointer;font-family:var(--font)">NONE</button>'
        + '</div>'
        + '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px">'
        + allTickers.map(function(t) {
            var pos = positions.find(function(p) { return p.ticker === t && !p.sold && p.qty > 0; });
            var name = pos && pos.shortName ? pos.shortName : '';
            var checked = selectedTickers.indexOf(t) !== -1 ? 'checked' : '';
            return '<label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer">'
              + '<input type="checkbox" id="chartcb_' + t + '" ' + checked + ' style="cursor:pointer">'
              + '<span>' + t + '</span>'
              + (name ? '<span style="color:var(--dim);font-size:10px">' + name + '</span>' : '')
              + '</label>';
          }).join('')
        + '</div>'
        + '<button onclick="applyChartSelection()" class="btn btn-green" style="font-size:10px;padding:5px 14px">APPLY</button>'
        + '</div>';
    }

    area.innerHTML = '<div style="padding:8px 0 4px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">'
      + ['1mo','3mo','6mo'].map(function(r) {
          var active = chartRange === r;
          return '<button onclick="setChartRange(&apos;' + r + '&apos;)" style="font-size:9px;letter-spacing:1px;padding:4px 10px;border:1px solid ' + (active ? 'var(--green)' : 'var(--border)') + ';background:' + (active ? 'var(--bg2)' : 'var(--bg)') + ';color:' + (active ? 'var(--green)' : 'var(--dim)') + ';cursor:pointer;font-family:var(--font)">' + r.toUpperCase() + '</button>';
        }).join('')
      + '<div style="flex:1"></div>'
      + (isWatchlist() ? '' : ['portfolio','positions'].map(function(t) {
          var active = cvt === t;
          return '<button onclick="setChartViewType(&apos;' + t + '&apos;)" style="font-size:9px;letter-spacing:1px;padding:4px 10px;border:1px solid ' + (active ? 'var(--green)' : 'var(--border)') + ';background:' + (active ? 'var(--bg2)' : 'var(--bg)') + ';color:' + (active ? 'var(--green)' : 'var(--dim)') + ';cursor:pointer;font-family:var(--font);text-transform:uppercase">' + t + '</button>';
        }).join(''))
      + '</div>'
      + (cvt === 'positions' ? '<div style="text-align:right;font-size:10px;margin-bottom:4px"><a href="#" onclick="toggleChartSelection();return false" style="color:var(--dim)">&#9998; Edit selection (' + selectedTickers.length + '/' + allTickers.length + ')</a></div>' : '')
      + selPanel
      + '<div id="chartArea" style="min-height:200px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:11px">Loading...</div>';

    if (cvt === 'portfolio' && !isWatchlist()) {
      loadChartData(chartRange);
    } else {
      loadPositionsChartData(chartRange, selectedTickers);
    }
    return;
  }

  // Weight view
  if (viewMode === 'weight') {
    function buildWeightRows(wFxMap) {
      var weightRows = '';
      var wTotVal = 0;
      getSorted().forEach(function(p) {
        if (p.current != null && p.qty > 0) {
          var rate = 1;
          var pc = getPositionCurrencyCode(p);
          if (pc !== baseCode) rate = wFxMap[pc + baseCode] || 1;
          wTotVal += p.qty * p.current * rate;
        }
      });
      getWeightSorted(getSorted(), wTotVal).forEach(function(p) {
        var wSoldStyle = p.sold ? 'font-style:italic;opacity:0.5' : '';
        if (p.current === null || p.current === undefined || p.qty === 0) {
          return; // skip qty=0 from weight view entirely
        }
        var pc = getPositionCurrencyCode(p);
        var rate = pc !== baseCode ? (wFxMap[pc + baseCode] || 1) : 1;
        var posValBase = p.qty * p.current * rate;
        var weight = wTotVal > 0 ? (posValBase / wTotVal) * 100 : null;
        weightRows += '<tr style="' + wSoldStyle + '">'
          + '<td style="text-align:left;white-space:nowrap">' + p.ticker + '</td>'
          + '<td style="padding:5px 4px;white-space:nowrap">' + getPositionCurrencySymbol(p) + f2(p.qty * p.current) + '</td>'
          + '<td style="padding:5px 4px;white-space:nowrap">' + fPctNoSign(weight) + '</td>'
          + '<td style="text-align:left;white-space:nowrap;font-size:11px;color:var(--dim);padding-left:8px">' + (p.shortName || '') + '</td>'
          + '</tr>';
      });
      return weightRows;
    }
    var weightTableHtml = '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">'
      + '<table style="border-collapse:collapse;font-size:13px">'
      + '<thead><tr>'
      + '<th style="text-align:left;padding:5px 4px;font-size:9px;color:var(--dim);letter-spacing:1px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap" onclick="sortWeight(&apos;ticker&apos;)">' + (weightSort.key==='ticker' ? (weightSort.dir>0?'&#9650;':'&#9660;')+' ' : '') + 'TICKER</th>'
      + '<th style="text-align:right;padding:5px 4px;font-size:9px;color:var(--dim);letter-spacing:1px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap" onclick="sortWeight(&apos;value&apos;)">' + (weightSort.key==='value' ? (weightSort.dir>0?'&#9650;':'&#9660;')+' ' : '') + 'VALUE</th>'
      + '<th style="text-align:right;padding:5px 4px;font-size:9px;color:var(--dim);letter-spacing:1px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap" onclick="sortWeight(&apos;weight&apos;)">' + (weightSort.key==='weight' ? (weightSort.dir>0?'&#9650;':'&#9660;')+' ' : '') + 'WEIGHT</th>'
      + '<th style="text-align:left;padding:5px 8px;font-size:9px;color:var(--dim);letter-spacing:1px;border-bottom:1px solid var(--border);white-space:nowrap">NAME</th>'
      + '</tr></thead>'
      + '<tbody id="weightTbody"></tbody>'
      + '</table>'
      + '</div>';
    if (posFxNeeded.length === 0) {
      area.innerHTML = weightTableHtml + '<div id="totalsSlot">' + totalsHtml + '</div>';
      document.getElementById('weightTbody').innerHTML = buildWeightRows({});
    } else {
      area.innerHTML = weightTableHtml + '<div id="totalsSlot">' + totalsHtml + '</div>';
      var wFxMap2 = {};
      var baseUrl3 = getApiKey() ? getApiKey().replace(/\/+$/, '') : '';
      var token3 = getToken();
      var wFxP = posFxNeeded.map(function(code) {
        var ticker2 = code + baseCode + '=X';
        return fetchFxRate(baseUrl3, token3, ticker2).then(function(rate) {
          if (rate) { wFxMap2[code + baseCode] = rate; wFxMap2[code] = rate; }
        });
      });
      Promise.all(wFxP).then(function() {
        var tb = document.getElementById('weightTbody');
        if (tb) tb.innerHTML = buildWeightRows(wFxMap2);
      });
    }
    return;
  }

  var tableHtml = '<div class="table-wrap">'
    + '<table>'
    + '<thead><tr>'
    + thBtn('ticker', 'TICKER', 'left')
    + thBtn('qty', 'QTY')
    + thBtn('entry', 'ENTRY')
    + thBtn('current', currentPortfolio().archive ? 'SELL PRICE' : 'CURRENT')
    + thBtn('pnl', 'P&amp;L')
    + thBtn('pnlpct', 'P&amp;L %')
    + '<th style="width:16px;padding:0"></th>'
    + '<th></th>'
    + '</tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '</table>'
    + '</div>';

  if (posFxNeeded.length === 0) {
    area.innerHTML = tableHtml + '<div id="totalsSlot">' + renderTotals({}) + '</div>';
  } else {
    area.innerHTML = tableHtml + '<div id="totalsSlot"></div>'; // totals come async
    var fxMap = {};
    var baseUrl2 = getApiKey() ? getApiKey().replace(/\/+$/, '') : '';
    var token2 = getToken();
    var fxP = posFxNeeded.map(function(code) {
      var ticker = code + baseCode + '=X';
      return fetchFxRate(baseUrl2, token2, ticker).then(function(rate) {
        if (rate) { fxMap[code + baseCode] = rate; fxMap[code] = rate; }
      });
    });
    Promise.all(fxP).then(function() {
      var slot = document.getElementById('totalsSlot');
      if (slot) slot.innerHTML = renderTotals(fxMap);
      var mktSlot = document.getElementById('mktTotalsSlot');
      if (mktSlot) mktSlot.innerHTML = buildMarketTotals(fxMap, baseCode, baseSym);
    });
  }

  if (editId) {
    var el = document.getElementById('editQty');
    if (el) el.focus();
  }
}

initPortfolios();
loadLocal();
document.getElementById('portfolioTitle').textContent = currentPortfolio().name;
showKeyStatus();
render();
cloudLoad(function(loaded) {
  if (loaded) render();
  if (getApiKey()) refreshAll();
});
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').then(function(reg) {
      console.log('SW registered:', reg.scope);
    }).catch(function(e) {
      console.log('SW error:', e);
    });
  });
}
</script>
</body>
</html>
