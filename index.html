<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Portfolio">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="./icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./icon-16.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Portfolio Terminal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c10;
    --bg2: #0d1117;
    --border: #1e2736;
    --text: #c8d6e5;
    --bright: #e2e8f0;
    --dim: #4a5568;
    --green: #00ff88;
    --red: #ff4466;
    --font: 'Courier New', 'Lucida Console', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-sub { font-size: 10px; color: var(--dim); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 3px; }
  .header-title { font-size: 20px; font-weight: bold; color: var(--bright); letter-spacing: 1px; }

  .btn { background: transparent; border: 1px solid var(--dim); color: var(--dim); font-family: var(--font); font-size: 10px; letter-spacing: 2px; padding: 7px 12px; cursor: pointer; text-transform: uppercase; }
  .btn-green { border-color: var(--green); color: var(--green); }
  .btn-primary { background: var(--green); color: var(--bg); border: none; font-weight: bold; padding: 9px 18px; font-size: 12px; cursor: pointer; font-family: var(--font); }
  .radio-styled {
    -webkit-appearance: none;
    appearance: none;
    width: 13px; height: 13px;
    border: 1px solid var(--dim);
    border-radius: 50%;
    background: var(--bg);
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
  }
  .radio-styled:checked {
    border-color: var(--green);
  }
  .radio-styled:checked::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
  }
  .btn-icon { border: none; font-size: 14px; padding: 0px 5px; cursor: pointer; background: transparent; color: var(--dim); font-family: var(--font); line-height: 1; }
  .btn-icon:hover { color: var(--bright); }

  .main { padding: 16px 18px; }


  .api-bar { background: var(--bg2); border: 1px solid var(--border); padding: 10px 14px; margin-bottom: 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .api-bar label { font-size: 9px; color: var(--dim); letter-spacing: 2px; white-space: nowrap; }
  .api-bar input { flex: 1; min-width: 160px; }
  .api-status { font-size: 10px; width: 100%; margin-top: 2px; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 400px; }
  th { text-align: right; padding: 5px 4px; font-size: 9px; color: var(--dim); letter-spacing: 1px; font-weight: normal; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th:first-child { text-align: left; }
  td { padding: 5px 4px; text-align: right; font-size: 13px; }
  td:first-child { text-align: left; font-weight: bold; color: var(--bright); letter-spacing: 1px; }
  tr:hover td { background: var(--bg2); }
  .pos { color: var(--green); font-weight: bold; }
  .neg { color: var(--red); font-weight: bold; }
  .muted { color: var(--dim); }
  .empty { text-align: center; color: var(--dim); padding: 36px 0; font-size: 11px; letter-spacing: 3px; }

  .totals-bar { display: flex; justify-content: flex-end; gap: 22px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .total-block { text-align: right; }
  .total-label { font-size: 9px; color: var(--dim); letter-spacing: 2px; margin-bottom: 2px; }
  .total-value { font-size: 13px; font-weight: bold; }

  .add-form { background: var(--bg2); border: 1px solid var(--border); padding: 12px 14px; margin-top: 14px; }
  .form-label { font-size: 9px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .form-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 9px; color: var(--dim); letter-spacing: 2px; }
  input[type=number], input[type=password], input[type=search] {
    background: var(--bg); border: 1px solid var(--border); color: var(--bright);
    font-family: var(--font); font-size: 13px; padding: 7px 8px; outline: none;
    -webkit-appearance: none; appearance: none;
  }
  input:focus { border-color: var(--dim); }
  .edit-input { background: var(--bg); border: 1px solid var(--border); color: var(--bright); font-family: var(--font); font-size: 12px; padding: 2px 5px; width: 70px; }
  .fetch-btn { border: 1px solid var(--dim); color: var(--dim); font-family: var(--font); font-size: 10px; padding: 2px 7px; cursor: pointer; background: transparent; }
  .err { color: var(--red); font-size: 11px; margin-top: 7px; }
  .note { margin-top: 16px; font-size: 10px; color: var(--dim); line-height: 1.6; }

  /* Portfolio switcher */
  .portfolio-switcher {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); z-index: 200;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 80px;
    display: none;
  }
  .portfolio-switcher.open { display: flex; }
  .portfolio-dropdown {
    background: var(--bg2); border: 1px solid var(--border);
    min-width: 260px; max-width: 90vw; max-height: 80vh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #portfolioList {
    overflow-y: auto;
    flex: 1;
  }
  .portfolio-dropdown-title {
    font-size: 9px; color: var(--dim); letter-spacing: 3px;
    padding: 12px 14px 8px; border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }
  .portfolio-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #131720;
    transition: background 0.15s;
  }
  .portfolio-item:hover { background: #131720; }
  .portfolio-item.active { color: var(--green); }
  .portfolio-item-name { font-size: 13px; font-weight: bold; letter-spacing: 1px; }
  .portfolio-item-count { font-size: 10px; color: var(--dim); }
  .portfolio-add-row {
    padding: 10px 14px 10px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    border-top: 1px solid var(--border);
  }
  .portfolio-add-row input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    color: var(--bright); font-family: var(--font); font-size: 12px;
    padding: 6px 8px; outline: none; text-transform: uppercase;
  }
  .header-title-btn {
    background: transparent; border: none; cursor: pointer;
    font-family: var(--font); font-size: 20px; font-weight: bold;
    color: var(--bright); letter-spacing: 1px; padding: 0;
    display: flex; align-items: center; gap: 6px;
  }
  .header-title-btn:hover { color: var(--green); }
  .header-title-arrow { font-size: 10px; color: var(--dim); }

  /* Settings panel */
  .settings-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg2); border-top: 1px solid var(--border);
    padding: 14px 18px 20px; z-index: 160;
    transform: translateY(100%); transition: transform 0.25s ease;
  }
  .settings-panel.open { transform: translateY(0); }
  .settings-title { font-size: 9px; color: var(--dim); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px; }
  .key-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .key-row label { font-size: 9px; color: var(--dim); letter-spacing: 2px; white-space: nowrap; min-width: 90px; }
  .key-row input { flex: 1; min-width: 0; }
  .settings-note { font-size: 10px; color: var(--dim); margin-top: 8px; }
  .overlay { display: none; position: fixed; inset: 0; z-index: 150; }
  .overlay.open { display: block; }

  @media (max-width: 480px) {
    .header { padding: 11px 14px; }
    .main { padding: 12px 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-sub">Portfolio Terminal</div>
    <button class="header-title-btn" onclick="toggleSwitcher()">
      <span id="portfolioTitle">MY PORTFOLIO</span>
      <span class="header-title-arrow">&#9660;</span>
    </button>
  </div>
  <button class="btn btn-green" id="refreshAllBtn" onclick="refreshAll()">&#8635; Refresh</button>
  <div style="position:relative;margin-left:8px">
    <button class="btn" id="viewMenuBtn" onclick="toggleViewMenu()" style="padding:7px 10px">&#8942;</button>
    <div id="viewMenu" style="display:none;position:absolute;right:0;top:110%;background:var(--bg2);border:1px solid var(--border);z-index:200;min-width:110px">
      <div onclick="setView('main')" id="vmMain" style="padding:10px 14px;cursor:pointer;font-size:11px;letter-spacing:2px">P&amp;L</div>
      <div onclick="setView('weight')" id="vmWeight" style="padding:10px 14px;cursor:pointer;font-size:11px;letter-spacing:2px">WEIGHTS</div>
      <div onclick="setView('market')" id="vmMarket" style="padding:10px 14px;cursor:pointer;font-size:11px;letter-spacing:2px">MARKET</div>
    </div>
  </div>
</div>

<div class="main">

  <div id="tableArea"></div>

  <div class="add-form">
    <div class="form-label">+ Добавить позицию</div>
    <div class="form-row" style="margin-bottom:8px">
      <div class="field" style="flex:1">
        <label>TICKER</label>
        <input type="search" id="fTicker" placeholder="NVDA, CJPU.L, CEBZ.DE..."
          inputmode="text" autocomplete="off" autocorrect="off"
          autocapitalize="characters" spellcheck="false"
          style="width:100%"
          oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9.\-^=]/g,'')"
          onkeydown="if(event.key==='Enter'){document.getElementById('fQty').focus()}">
      </div>
      <div class="field" style="flex:none;align-self:flex-end;padding-bottom:2px">
        <button class="btn-icon" onclick="pastePosition()" id="pasteBtn" title="Paste" style="font-size:16px;padding:4px 6px;color:var(--dim)">&#10697;</button>
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>QTY</label>
        <input type="number" id="fQty" placeholder="10" min="0" step="any" style="width:78px" onkeydown="if(event.key==='Enter')addPosition()">
      </div>
      <div class="field">
        <label>ENTRY</label>
        <input type="number" id="fEntry" placeholder="150.00" min="0" step="any" style="width:98px" onkeydown="if(event.key==='Enter')addPosition()">
      </div>
      <div class="field">
        <label>CURRENT (опц.)</label>
        <input type="number" id="fCurrent" placeholder="&#8212;" min="0" step="any" style="width:98px" onkeydown="if(event.key==='Enter')addPosition()">
      </div>
      <button class="btn-primary" onclick="addPosition()">ADD</button>
    </div>
    <div class="err" id="addErr"></div>
  </div>

  <div class="note" id="mainNote"></div>
  <div style="height:60px"></div>
</div>


<!-- Bond Database Modal -->
<div id="bondDbModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:300;align-items:center;justify-content:center">
  <div style="background:var(--bg2);border:1px solid var(--border);width:90vw;max-width:500px;max-height:80vh;display:flex;flex-direction:column">
    <div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:9px;letter-spacing:2px;color:var(--dim)">BOND DATABASE</span>
      <button class="btn-icon" onclick="closeBondDb()" style="font-size:16px">&#10005;</button>
    </div>
    <div id="bondDbList" style="overflow-y:auto;flex:1;padding:0 14px"></div>
    <div style="border-top:1px solid var(--border);padding:12px 14px">
      <div style="font-size:9px;color:var(--dim);letter-spacing:2px;margin-bottom:8px">ADD BOND</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">
        <input type="text" id="bondDbName" placeholder="Bond name" autocomplete="off" oninput="this.value=this.value.toUpperCase()" style="text-transform:uppercase;flex:2;min-width:120px;background:var(--bg);border:1px solid var(--border);color:var(--bright);font-family:var(--font);font-size:12px;padding:5px 8px;outline:none">
        <input type="text" id="bondDbCurrency" placeholder="USD" maxlength="3" style="width:44px;background:var(--bg);border:1px solid var(--border);color:var(--bright);font-family:var(--font);font-size:12px;padding:5px 8px;outline:none;text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">
        <input type="number" id="bondDbPar" placeholder="Par Value" min="0" step="any" style="flex:1;min-width:80px;background:var(--bg);border:1px solid var(--border);color:var(--bright);font-family:var(--font);font-size:12px;padding:5px 8px;outline:none">
        <input type="number" id="bondDbYield" placeholder="Yield %" min="0" step="0.01" style="flex:1;min-width:80px;background:var(--bg);border:1px solid var(--border);color:var(--bright);font-family:var(--font);font-size:12px;padding:5px 8px;outline:none">
        <input type="number" id="bondDbFreq" placeholder="2" min="1" max="12" step="1" style="width:50px;background:var(--bg);border:1px solid var(--border);color:var(--bright);font-family:var(--font);font-size:12px;padding:5px 8px;outline:none">
        <input type="date" id="bondDbMaturity" style="flex:1;min-width:110px;background:var(--bg);border:1px solid var(--border);color:var(--bright);font-family:var(--font);font-size:12px;padding:5px 8px;outline:none">
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-green" onclick="addBondToDb()">+ ADD</button>
        <span id="bondDbErr" style="color:var(--red);font-size:11px"></span>
      </div>
    </div>
  </div>
</div>

<!-- Portfolio Switcher -->
<div class="portfolio-switcher" id="portfolioSwitcher" onclick="closeSwitcherOutside(event)">
  <div class="portfolio-dropdown">
    <div class="portfolio-dropdown-title" style="display:flex;align-items:center;justify-content:space-between;padding-right:8px">
      <span>Portfolios</span>
      <div style="display:flex;gap:0">
        <button onclick="setSwitcherTab('active')" id="tabActive" style="font-size:9px;letter-spacing:1px;padding:3px 8px;border:1px solid var(--border);background:var(--bg2);color:var(--green);cursor:pointer;font-family:var(--font)">ACTIVE</button>
        <button onclick="setSwitcherTab('archive')" id="tabArchive" style="font-size:9px;letter-spacing:1px;padding:3px 8px;border:1px solid var(--border);border-left:none;background:var(--bg);color:var(--dim);cursor:pointer;font-family:var(--font)">ARCHIVE</button><button onclick="setSwitcherTab('bonds')" id="tabBonds" style="font-size:9px;letter-spacing:1px;padding:3px 8px;border:1px solid var(--border);border-left:none;background:var(--bg);color:var(--dim);cursor:pointer;font-family:var(--font)">BONDS</button>
      </div>
    </div>
    <div id="portfolioList"></div>
    <div class="portfolio-add-row" id="portfolioAddRow">
      <input type="search" id="newPortfolioName" placeholder="NAME"
        inputmode="text" autocomplete="off" autocorrect="off"
        autocapitalize="characters" spellcheck="false"
        style="-webkit-appearance:none;flex:2"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')addPortfolio()">
      <input type="search" id="newPortfolioCurrencyCode" placeholder="USD"
        inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="characters"
        spellcheck="false"
        style="-webkit-appearance:none;width:52px;flex:none;text-align:center"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')addPortfolio()">
      <button class="btn btn-green" onclick="addPortfolio()" style="white-space:nowrap">+ ADD</button>
    </div>
    <div id="portfolioTypeRow" style="padding:6px 0 6px;display:flex;gap:16px">
      <label style="display:flex;align-items:center;gap:5px;font-size:9px;color:var(--dim);letter-spacing:1px;cursor:pointer">
        <input type="radio" name="portfolioType" value="regular" checked class="radio-styled"> REGULAR
      </label>
      <label style="display:flex;align-items:center;gap:5px;font-size:9px;color:var(--dim);letter-spacing:1px;cursor:pointer">
        <input type="radio" name="portfolioType" value="index" class="radio-styled"> INDEX
      </label>
    </div>
  </div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeSettings()"></div>

<!-- Settings panel -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-title">&#9881; Настройки</div>

  <div style="font-size:9px;color:var(--dim);letter-spacing:2px;margin-bottom:8px">ИСТОЧНИК ЦЕН — BACKEND URL</div>
  <div class="key-row">
    <label>API URL</label>
    <input type="text" id="apiKeyInput" placeholder="https://your-worker.workers.dev" autocomplete="off">
    <button class="btn btn-green" onclick="saveApiKey()">OK</button>
  </div>
  <div class="key-row" style="margin-top:6px">
    <label>API TOKEN</label>
    <input type="password" id="apiTokenInput" placeholder="секретный токен" style="font-size:11px" autocomplete="new-password">
    <button class="btn btn-green" onclick="saveToken()">OK</button>
  </div>
  <div style="font-size:9px;color:var(--dim);letter-spacing:2px;margin:14px 0 8px">ОБЛАЧНОЕ ХРАНИЛИЩЕ — JSONBIN</div>
  <div class="key-row">
    <label>MASTER KEY</label>
    <input type="password" id="jbKeyInput" placeholder="jsonbin.io → API Keys" autocomplete="new-password">
    <button class="btn btn-green" onclick="saveJbKey()">OK</button>
  </div>
  <div class="key-row" style="margin-top:6px">
    <label>BIN ID</label>
    <input type="text" id="jbBinInput" placeholder="вставь с другого устройства" style="font-size:11px">
    <button class="btn btn-green" onclick="manualCloudLoad()">OK</button>
    <button class="btn" onclick="clearJbBin()">✕</button>
  </div>
  <div class="api-status" id="jbStatus"></div>
  <div class="key-row" style="margin-top:6px">
    <label>ENC KEY</label>
    <input type="password" id="encKeyInput" placeholder="пароль шифрования" autocomplete="new-password" style="font-size:11px">
    <button class="btn btn-green" onclick="saveEncKey()">OK</button>
    <button class="btn" onclick="clearEncKey()">✕</button>
  </div>
  <div class="api-status" id="encStatus" style="font-size:10px"></div>
  <div style="margin-top:10px;display:flex;gap:8px">
    <button class="btn btn-green" onclick="syncFromCloud()" style="flex:1;padding:9px;font-size:11px;letter-spacing:1px">
      &#8595; SYNC FROM CLOUD
    </button>
    <button class="btn" onclick="migrateToCloud()" style="flex:1;padding:9px;font-size:10px;letter-spacing:0px;border-color:var(--red);color:var(--red)">
      &#8593; OVERWRITE CLOUD
    </button>
  </div>
  <div style="font-size:9px;color:var(--dim);letter-spacing:2px;margin:14px 0 8px">BACKUP / RESTORE</div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-green" onclick="backupData()" style="flex:1;padding:9px;font-size:11px;letter-spacing:1px">
      &#8595; BACKUP
    </button>
    <button class="btn" onclick="document.getElementById('restoreInput').click()" style="flex:1;padding:9px;font-size:11px;letter-spacing:1px">
      &#8593; RESTORE
    </button>
    <input type="file" id="restoreInput" accept=".json" style="display:none" onchange="restoreData(event)">
  </div>
  <div class="api-status" id="backupStatus"></div>
  <div style="font-size:9px;color:var(--dim);letter-spacing:2px;margin:14px 0 8px">MARKET VIEW</div>
  <div style="display:flex;align-items:center;gap:10px">
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:11px;color:var(--dim);letter-spacing:1px">
      <input type="checkbox" id="resetDeltaChk" onchange="saveResetDelta()" style="width:14px;height:14px;cursor:pointer">
      CONTINUOUS Δ% ACROSS SESSIONS
    </label>
  </div>
  <div class="settings-note" id="settingsNote"></div>
</div>

<!-- Settings toggle button -->
<div style="position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:10px 18px;display:flex;justify-content:space-between;align-items:center;z-index:98">
  <span style="font-size:10px;color:var(--dim)" id="providerLabel"></span>
  <button class="btn btn-green" onclick="toggleSettings()" style="font-size:11px;padding:6px 14px">&#9881; НАСТРОЙКИ</button>
</div>

<script>
// --- Multi-portfolio ---
var portfolios = {};  // { id: { name, positions } }
var currentPortfolioId = null;

function getPortfolios() {
  try { return JSON.parse(localStorage.getItem('pt_portfolios') || '{}'); } catch(e) { return {}; }
}
function savePortfolios() {
  try { localStorage.setItem('pt_portfolios', JSON.stringify(portfolios)); } catch(e) {}
}
function initPortfolios() {
  portfolios = getPortfolios();
  // Migrate legacy data (pt_v3) into default portfolio if no portfolios exist
  if (Object.keys(portfolios).length === 0) {
    var legacy = [];
    try { legacy = JSON.parse(localStorage.getItem('pt_v3') || '[]'); } catch(e) {}
    var id = 'p_' + Date.now();
    portfolios[id] = { name: 'MY PORTFOLIO', positions: legacy };

function addBondPosition(bpId) {
  var bondId = document.getElementById('bpBondId').value;
  var purchaseDate = document.getElementById('bpDate').value;
  var qty = parseInt(document.getElementById('bpQty').value);
  var cleanPrice = parseFloat(document.getElementById('bpClean').value);
  var accruedInterest = parseFloat(document.getElementById('bpNkd').value) || 0;
  var err = document.getElementById('bpErr');
  if (!bondId) { err.textContent = 'Select bond'; return; }
  if (!purchaseDate) { err.textContent = 'Enter purchase date'; return; }
  if (!qty || qty <= 0) { err.textContent = 'Enter qty'; return; }
  if (!cleanPrice || cleanPrice <= 0) { err.textContent = 'Enter clean price'; return; }
  var bond = bondsDb.find(function(b) { return b.id === bondId; });
  if (!bond) { err.textContent = 'Bond not found'; return; }
  // Check maturity not in past
  if (new Date(bond.maturityDate) <= new Date(purchaseDate)) { err.textContent = 'Maturity date must be after purchase date'; return; }
  err.textContent = '';
  bondPortfolios[bpId].positions.push({ id: 'bpos_' + Date.now(), bondId: bondId, bondName: bond.name, purchaseDate: purchaseDate, qty: qty, cleanPrice: cleanPrice, accruedInterest: accruedInterest });
  saveBondPortfolios();
  render();
}

function renderSwitcher() {
  var list = document.getElementById('portfolioList');
  var summaryActive = viewMode === 'summary';
  var html = '';
  var ids = Object.keys(portfolios);

  if (switcherTab === 'bonds') {
    renderBondsSwitcher(html, list, summaryActive);

  }

  if (switcherTab === 'archive') {
    // Archive tab
    var archiveIds = ids.filter(function(id) { return portfolios[id].archive; }).sort(function(a,b) { return portfolios[a].name.localeCompare(portfolios[b].name); });

      html += '<div class="portfolio-item' + (active ? ' active' : '') + '" style="display:flex;align-items:center">'
        + '<div onclick="switchPortfolio(&apos;' + id + '&apos;)" style="flex:1;cursor:pointer;min-width:0">'

        + '<span class="portfolio-item-count">' + p.positions.length + ' pos' + (active ? ' &#10003;' : '') + '</span>'
        + '</div>'
        + '<button class="btn-icon" onclick="renamePortfolio(&apos;' + id + '&apos;)" title="Rename" style="font-size:13px;padding:4px 7px">&#9998;</button>'
        + '<button class="btn-icon" onclick="deletePortfolio(&apos;' + id + '&apos;)" title="Delete" style="font-size:13px;padding:4px 7px;color:var(--red)">&#10005;</button>'
        + '</div>';
    });
    if (archiveIds.length === 0) html += '<div style="padding:10px 14px;font-size:11px;color:var(--dim)">Нет архивных портфелей</div>';
    // Archive summary
    html += '<div class="portfolio-item' + (viewMode === 'archive-summary' ? ' active' : '') + '" style="display:flex;align-items:center;cursor:pointer;border-top:1px solid var(--border);margin-top:4px;padding-top:4px" onclick="switchToArchiveSummary()">'
      + '<div style="flex:1"><span class="portfolio-item-name">&#931; SUMMARY</span></div>'
      + '</div>';
    list.innerHTML = html;
    return;
  }

  // Active tab
  var indexIds = ids.filter(function(id) { return portfolios[id].watchlist && !portfolios[id].archive; }).sort(function(a,b) { return portfolios[a].name.localeCompare(portfolios[b].name); });
  var regularIds = ids.filter(function(id) { return !portfolios[id].watchlist && !portfolios[id].archive; }).sort(function(a,b) { return portfolios[a].name.localeCompare(portfolios[b].name); });
  var sortedIds = indexIds.concat(regularIds);
  var hasIndex = indexIds.length > 0;
  var hasRegular = regularIds.length > 0;
  sortedIds.forEach(function(id, i) {
    var p = portfolios[id];
    var active = id === currentPortfolioId;
    // Add divider between index and regular sections
    if (hasIndex && hasRegular && i === indexIds.length) {
      html += '<div style="border-top:1px solid var(--border);margin:4px 0"></div>';

async function deriveKey(password, salt) {
  var enc = new TextEncoder();
  var keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false, ['encrypt', 'decrypt']
  );
}

async function encryptData(plaintext, password) {
  var salt = crypto.getRandomValues(new Uint8Array(16));
  var iv = crypto.getRandomValues(new Uint8Array(12));
  var key = await deriveKey(password, salt);
  var enc = new TextEncoder();
  var ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, enc.encode(plaintext));
  // Pack: salt(16) + iv(12) + ciphertext
  var buf = new Uint8Array(16 + 12 + ciphertext.byteLength);
  buf.set(salt, 0); buf.set(iv, 16); buf.set(new Uint8Array(ciphertext), 28);
  return btoa(String.fromCharCode.apply(null, buf));
}

async function decryptData(b64, password) {
  var buf = new Uint8Array(atob(b64).split('').map(function(c) { return c.charCodeAt(0); }));
  var salt = buf.slice(0, 16);
  var iv = buf.slice(16, 28);
  var ciphertext = buf.slice(28);
  var key = await deriveKey(password, salt);
  var plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ciphertext);
  return new TextDecoder().decode(plain);
}

function restoreData(event) {

  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!data.portfolios) throw new Error('invalid format');
      if (!confirm('Восстановить данные из backup? Текущие данные будут перезаписаны.')) return;
      portfolios = data.portfolios;

      currentPortfolioId = Object.keys(portfolios)[0];

      renderSwitcher();

function migrateToCloud() {
  var key = getJbKey();
  if (!key) {
    updateJbStatus('✗ Сначала введи Master Key выше', 'var(--red)');
    return;
  }
  // Load from localStorage fresh
  var local = [];
  try { local = JSON.parse(localStorage.getItem(STORAGE) || '[]'); } catch(e) {}
  if (!local.length) {
    updateJbStatus('✗ Локальных данных нет — нечего мигрировать', 'var(--dim)');
    return;
  }
  var binId = getJbBin();
  updateJbStatus('Создаю bin и загружаю ' + local.length + ' позиций...', 'var(--dim)');

  function doCreate() {
    return fetch('https://api.jsonbin.io/v3/b', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': key, 'X-Bin-Name': 'portfolio' },
      body: JSON.stringify({ portfolios: portfolios })
    }).then(function(r) { return r.json(); }).then(function(res) {
      var id = res.metadata && res.metadata.id;
      if (!id) throw new Error('no_id: ' + JSON.stringify(res));
      localStorage.setItem('pt_jbbin', id);
      document.getElementById('jbBinInput').value = id;
      positions = local;
      saveLocal();
      updateJbStatus('✓ Создан bin ' + id + ' — ' + local.length + ' позиций мигрировано', 'var(--green)');
      updateSettingsUI();
      render();
    });
  }

  function doUpdate(id) {
    return fetch('https://api.jsonbin.io/v3/b/' + id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': key },
      body: JSON.stringify({ portfolios: portfolios })
    }).then(function(r) {
      if (!r.ok) throw new Error('http_' + r.status);
      positions = local;
      saveLocal();
      updateJbStatus('✓ Bin ' + id + ' обновлён — ' + local.length + ' позиций', 'var(--green)');
      updateSettingsUI();
      render();
    });
  }

  (binId ? doUpdate(binId) : doCreate()).catch(function(e) {
    updateJbStatus('✗ Ошибка: ' + e.message, 'var(--red)');
  });
}

function updateJbStatus(msg, color) {

}

function cloudSave() {
  var key = getJbKey();
  if (!key) return; // no key — local only
  var binId = getJbBin();
  if (!binId) {
    // No bin yet — safe to create
    _doCloudSave(key, binId);
    return;
  }
  // Check if cloud has been updated since our last load
  fetch('https://api.jsonbin.io/v3/b/' + binId + '/meta', {
    headers: { 'X-Master-Key': key }
  }).then(function(r) { return r.json(); }).then(function(res) {
    var cloudTs = res.metadata && res.metadata.updatedAt ? res.metadata.updatedAt : null;
    var localTs = localStorage.getItem('pt_cloud_ts');
    if (cloudTs && localTs && cloudTs !== localTs) {
      // Cloud is newer — block save
      updateJbStatus('✗ Данные в облаке более новые. Сначала синхронизируйте данные (↓ SYNC FROM CLOUD)', 'var(--red)');
      return;
    }
    _doCloudSave(key, binId);
  }).catch(function() {
    // If meta check fails — proceed with save
    _doCloudSave(key, binId);
  });
}

function _doCloudSave(key, binId) {
  var plaintext = JSON.stringify({ portfolios: portfolios });
  var encKey = getEncKey();

  function doSend(body) {
    if (!binId) {
      fetch('https://api.jsonbin.io/v3/b', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': key, 'X-Bin-Name': 'portfolio' },
        body: body
      }).then(function(r) { return r.json(); }).then(function(res) {
        var id = res.metadata && res.metadata.id;
        if (!id) throw new Error('no_id');
        localStorage.setItem('pt_jbbin', id);
        localStorage.setItem('pt_cloud_ts', res.metadata.updatedAt || new Date().toISOString());
        document.getElementById('jbBinInput').value = id;
        updateJbStatus('✓ Облако: bin создан и сохранён', 'var(--green)');
      }).catch(function() { updateJbStatus('✗ Ошибка создания bin', 'var(--red)'); });
    } else {
      fetch('https://api.jsonbin.io/v3/b/' + binId, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': key },
        body: body
      }).then(function(r) {
        if (!r.ok) throw new Error('http_' + r.status);
        return r.json();
      }).then(function(res) {
        localStorage.setItem('pt_cloud_ts', res.metadata && res.metadata.updatedAt ? res.metadata.updatedAt : new Date().toISOString());
        updateJbStatus('✓ Облако: сохранено ' + new Date().toLocaleTimeString(), 'var(--green)');
      }).catch(function() { updateJbStatus('✗ Ошибка сохранения', 'var(--red)'); });
    }
  }

  if (encKey) {
    encryptData(plaintext, encKey).then(function(encrypted) {
      doSend(JSON.stringify({ encrypted: encrypted }));
    }).catch(function() { updateJbStatus('✗ Ошибка шифрования', 'var(--red)'); });
  } else {
    doSend(JSON.stringify({ portfolios: portfolios }));
  }
}

function cloudLoad(callback) {
  var key = getJbKey();
  var binId = getJbBin();
  if (!key || !binId) { callback(false); return; }
  updateJbStatus('Загрузка из облака...', 'var(--dim)');
  fetch('https://api.jsonbin.io/v3/b/' + binId + '/latest', {
    headers: { 'X-Master-Key': key }
  }).then(function(r) {
    if (!r.ok) throw new Error('http_' + r.status);
    return r.json();
  }).then(function(res) {
    var data = res.record;

    function processData(data) {
      if (data && data.portfolios && typeof data.portfolios === 'object') {
        portfolios = data.portfolios;
        savePortfolios();
        if (!portfolios[currentPortfolioId]) {
          currentPortfolioId = Object.keys(portfolios)[0];
          localStorage.setItem('pt_current', currentPortfolioId);
        }
        loadLocal();
        document.getElementById('portfolioTitle').textContent = currentPortfolio().name;
        localStorage.setItem('pt_cloud_ts', res.metadata && res.metadata.updatedAt ? res.metadata.updatedAt : new Date().toISOString());
        updateJbStatus('✓ Загружено из облака', 'var(--green)');
        callback(true);
      } else if (data && Array.isArray(data.positions)) {
        portfolios[currentPortfolioId].positions = data.positions;
        savePortfolios();
        loadLocal();
        updateJbStatus('✓ Загружено из облака (legacy): ' + data.positions.length + ' позиций', 'var(--green)');
        callback(true);
      } else { callback(false); }
    }

    if (data && data.encrypted) {
      var encKey = getEncKey();
      if (!encKey) {
        updateJbStatus('✗ Данные зашифрованы — укажите ENC KEY', 'var(--red)');
        callback(false);
        return;
      }
      decryptData(data.encrypted, encKey).then(function(plain) {
        try { processData(JSON.parse(plain)); }
        catch(e) { updateJbStatus('✗ Ошибка расшифровки', 'var(--red)'); callback(false); }
      }).catch(function() {
        updateJbStatus('✗ Неверный пароль шифрования', 'var(--red)');
        callback(false);
      });
    } else {
      processData(data);
    }
  }).catch(function(e) {
    updateJbStatus('✗ Ошибка загрузки из облака', 'var(--red)');
    callback(false);
  });
}

function validateCurrencyCode(code, callback) {
  if (code === 'USD') { callback(true); return; }
  var baseUrl = getApiKey() ? getApiKey().replace(/\/+$/, '') : '';
  var token = getToken();
  if (!baseUrl) { callback(true); return; } // no backend — skip validation
  var url = baseUrl + '/api/quote?ticker=' + encodeURIComponent(code + 'USD=X');
  var opts = token ? { headers: { 'X-API-Token': token } } : {};
  fetch(url, opts).then(function(r) { return r.json(); }).then(function(d) {
    callback(!!(d.price && d.price > 0));
  }).catch(function() { callback(false); });
}


// --- AES-GCM Cloud Encryption ---
function getEncKey() { return localStorage.getItem('pt_enc_key') || ''; }
function saveEncKey(v) { localStorage.setItem('pt_enc_key', v); }

async function deriveKey(password, salt) {
  var enc = new TextEncoder();
  var keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false, ['encrypt', 'decrypt']
  );
}

async function encryptData(plaintext, password) {
  var enc = new TextEncoder();
  var salt = crypto.getRandomValues(new Uint8Array(16));
  var iv = crypto.getRandomValues(new Uint8Array(12));
  var key = await deriveKey(password, salt);
  var ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, enc.encode(plaintext));
  // Pack: salt(16) + iv(12) + ciphertext → base64
  var combined = new Uint8Array(16 + 12 + ciphertext.byteLength);
  combined.set(salt, 0);
  combined.set(iv, 16);
  combined.set(new Uint8Array(ciphertext), 28);
  return btoa(String.fromCharCode(...combined));
}

async function decryptData(b64, password) {
  var bytes = Uint8Array.from(atob(b64), function(c) { return c.charCodeAt(0); });
  var salt = bytes.slice(0, 16);
  var iv = bytes.slice(16, 28);
  var ciphertext = bytes.slice(28);
  var key = await deriveKey(password, salt);
  var plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ciphertext);
  return new TextDecoder().decode(plain);
}

function fetchPrice(ticker) {
  var baseUrl = getApiKey();
  if (!baseUrl) return Promise.reject(new Error('no_key'));
  baseUrl = baseUrl.replace(/\/+$/, '');
  var token = getToken();
  var url = baseUrl + '/api/quote?ticker=' + encodeURIComponent(ticker) + (isWatchlist() ? '&simple=1' : '');
  // 10 second timeout
  var controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
  var timer = controller ? setTimeout(function() { controller.abort(); }, 10000) : null;
  var opts = controller ? { signal: controller.signal } : {};
  if (token) {
    opts.headers = { 'X-API-Token': token };
  }
  return fetch(url, opts).then(function(r) {
    if (timer) clearTimeout(timer);
    if (!r.ok) throw new Error('http_' + r.status);
    return r.json();
  }).then(function(data) {
    if (!data || !data.price || data.error) throw new Error(data.error || 'no_price');
    __priceType = data.priceType || 'regular';
    __marketState = data.marketState || 'CLOSED';
    __regularMarketPrice = data.regularMarketPrice || data.price;
    __previousClose = data.previousClose || null;
    __currency = data.currency || null;
    __shortName = data.shortName || null;
    return data.price;
  });
}

function fPct(n) {
  if (n === null || n === undefined || isNaN(n)) return '&mdash;';
  return (n >= 0 ? '+' : '') + f2(n) + '%';
}
function cls(n) {

function refreshPrice(id) {
  var pos = null;
  for (var i = 0; i < positions.length; i++) { if (positions[i].id === id) { pos = positions[i]; break; } }

  loadingSet[id] = true; render();
  return fetchPrice(pos.ticker).then(function(price) {
    positions = positions.map(function(p) {
      if (p.id === id) { return Object.assign({}, p, { current: price, priceType: __priceType, marketState: __marketState, regularMarketPrice: __regularMarketPrice, previousClose: __previousClose, currency: __currency, shortName: __shortName }); }

function sortBy(key) {
  if (sortKey === key) { sortDir *= -1; } else { sortKey = key; sortDir = 1; }
  try { localStorage.setItem('pt_sort', JSON.stringify({key: sortKey, dir: sortDir})); } catch(e) {}

}

function getSorted() {
  if (!sortKey) return positions.slice();
  return positions.slice().sort(function(a, b) {
    var va, vb;
    if (sortKey === 'ticker') { var cmp = sortDir * a.ticker.localeCompare(b.ticker); if (cmp !== 0) return cmp; return (a.sold ? 0 : 1) - (b.sold ? 0 : 1); }
    if (sortKey === 'qty')    { va = a.qty; vb = b.qty; }
    if (sortKey === 'entry')  { va = a.entry; vb = b.entry; }
    if (sortKey === 'current'){ va = a.current !== null ? a.current : -Infinity; vb = b.current !== null ? b.current : -Infinity; }
    if (sortKey === 'pnl')    { va = (a.current !== null) ? (a.current - a.entry) * a.qty : -Infinity; vb = (b.current !== null) ? (b.current - b.entry) * b.qty : -Infinity; }
    if (sortKey === 'pnlpct') { va = (a.current !== null && a.entry) ? (a.current - a.entry) / a.entry : -Infinity; vb = (b.current !== null && b.entry) ? (b.current - b.entry) / b.entry : -Infinity; }

    var bBase = (b.marketState === 'REGULAR') ? (b.previousClose || b.regularMarketPrice) : ((getResetDelta() ? b.previousClose : b.regularMarketPrice) || b.regularMarketPrice);

      + '<th style="text-align:right;padding:5px 4px;font-size:9px;color:var(--dim);letter-spacing:1px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap" onclick="sortMarket(&apos;delta&apos;)">&#916;%' + mkDeltaArrow + '</th>'
      + '<th style="width:16px;padding:0"></th>'
      + '<th style="text-align:left;padding:5px 8px;font-size:9px;color:var(--dim);letter-spacing:1px;border-bottom:1px solid var(--border);white-space:nowrap">NAME</th>'
      + '</tr></thead>'
      + '<tbody>' + marketRows + '</tbody>'
      + '</table>'
      + '</div>'
      + totalsHtml;
    return;
  }

  // Weight view
  if (viewMode === 'weight') {
    function buildWeightRows(wFxMap) {
      var weightRows = '';
      var wTotVal = 0;
      getSorted().forEach(function(p) {
        if (p.current != null && p.qty > 0) {
          var rate = 1;
          var pc = getPositionCurrencyCode(p);
          if (pc !== baseCode) rate = wFxMap[pc + baseCode] || 1;
          wTotVal += p.qty * p.current * rate;
        }
      });
      getWeightSorted(getSorted(), wTotVal).forEach(function(p) {
        var wSoldStyle = p.sold ? 'font-style:italic;opacity:0.5' : '';
        if (p.current === null || p.current === undefined || p.qty === 0) {
          weightRows += '<tr style="' + wSoldStyle + '">'
            + '<td style="text-align:left;white-space:nowrap">' + p.ticker + '</td>'
            + '<td><span class="muted">&mdash;</span></td>'
            + '<td><span class="muted">&mdash;</span></td>'
            + '<td style="text-align:left;white-space:nowrap;font-size:11px;color:var(--dim);padding-left:8px"></td>'
            + '</tr>';
          return;
        }
        var pc = getPositionCurrencyCode(p);
        var rate = pc !== baseCode ? (wFxMap[pc + baseCode] || 1) : 1;
        var posValBase = p.qty * p.current * rate;
        var weight = wTotVal > 0 ? (posValBase / wTotVal) * 100 : null;
        weightRows += '<tr style="' + wSoldStyle + '">'
          + '<td style="text-align:left;white-space:nowrap">' + p.ticker + '</td>'
          + '<td style="padding:5px 4px;white-space:nowrap">' + getPositionCurrencySymbol(p) + f2(p.qty * p.current) + '</td>'
          + '<td style="padding:5px 4px;white-space:nowrap">' + fPctNoSign(weight) + '</td>'
          + '<td style="text-align:left;white-space:nowrap;font-size:11px;color:var(--dim);padding-left:8px">' + (p.shortName || '') + '</td>'
          + '</tr>';
      });
      return weightRows;
    }
    var weightTableHtml = '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">'
      + '<table style="border-collapse:collapse;font-size:13px">'
      + '<thead><tr>'
      + '<th style="text-align:left;padding:5px 4px;font-size:9px;color:var(--dim);letter-spacing:1px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap" onclick="sortWeight(&apos;ticker&apos;)">' + (weightSort.key==='ticker' ? (weightSort.dir>0?'&#9650;':'&#9660;')+' ' : '') + 'TICKER</th>'
      + '<th style="text-align:right;padding:5px 4px;font-size:9px;color:var(--dim);letter-spacing:1px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap" onclick="sortWeight(&apos;value&apos;)">' + (weightSort.key==='value' ? (weightSort.dir>0?'&#9650;':'&#9660;')+' ' : '') + 'VALUE</th>'
      + '<th style="text-align:right;padding:5px 4px;font-size:9px;color:var(--dim);letter-spacing:1px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap" onclick="sortWeight(&apos;weight&apos;)">' + (weightSort.key==='weight' ? (weightSort.dir>0?'&#9650;':'&#9660;')+' ' : '') + 'WEIGHT</th>'
      + '<th style="text-align:left;padding:5px 8px;font-size:9px;color:var(--dim);letter-spacing:1px;border-bottom:1px solid var(--border);white-space:nowrap">NAME</th>'
      + '</tr></thead>'
      + '<tbody id="weightTbody"></tbody>'
      + '</table>'
      + '</div>';
    if (posFxNeeded.length === 0) {
      area.innerHTML = weightTableHtml + '<div id="totalsSlot">' + totalsHtml + '</div>';
      document.getElementById('weightTbody').innerHTML = buildWeightRows({});
    } else {
      area.innerHTML = weightTableHtml + '<div id="totalsSlot">' + totalsHtml + '</div>';
      var wFxMap2 = {};
      var baseUrl3 = getApiKey() ? getApiKey().replace(/\/+$/, '') : '';
      var token3 = getToken();
      var wFxP = posFxNeeded.map(function(code) {
        var ticker = code + baseCode + '=X';
        var url = baseUrl3 + '/api/quote?ticker=' + encodeURIComponent(ticker);
        var opts3 = token3 ? { headers: { 'X-API-Token': token3 } } : {};
        return fetch(url, opts3).then(function(r) { return r.json(); }).then(function(d) {
          if (d.price) wFxMap2[code + baseCode] = d.price;
        }).catch(function() {});
      });
      Promise.all(wFxP).then(function() {
        var tb = document.getElementById('weightTbody');
        if (tb) tb.innerHTML = buildWeightRows(wFxMap2);
      });
    }
    return;
  }

  var tableHtml = '<div class="table-wrap">'
    + '<table>'
    + '<thead><tr>'
    + thBtn('ticker', 'TICKER', 'left')
    + thBtn('qty', 'QTY')
    + thBtn('entry', 'ENTRY')
    + thBtn('current', 'CURRENT')
    + thBtn('pnl', 'P&amp;L')
    + thBtn('pnlpct', 'P&amp;L %')
    + '<th style="width:16px;padding:0"></th>'
    + '<th></th>'
    + '</tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '</table>'
    + '</div>';

  if (posFxNeeded.length === 0) {
    area.innerHTML = tableHtml + '<div id="totalsSlot">' + renderTotals({}) + '</div>';
  } else {
    area.innerHTML = tableHtml + '<div id="totalsSlot"></div>'; // totals come async
    var fxMap = {};
    var baseUrl2 = getApiKey() ? getApiKey().replace(/\/+$/, '') : '';
    var token2 = getToken();
    var fxP = posFxNeeded.map(function(code) {
      var ticker = code + baseCode + '=X';
      var url = baseUrl2 + '/api/quote?ticker=' + encodeURIComponent(ticker);
      var opts2 = token2 ? { headers: { 'X-API-Token': token2 } } : {};
      return fetch(url, opts2).then(function(r) { return r.json(); }).then(function(d) {
        if (d.price) fxMap[code + baseCode] = d.price;
      }).catch(function() {});
    });
    Promise.all(fxP).then(function() {
      var slot = document.getElementById('totalsSlot');
      if (slot) slot.innerHTML = renderTotals(fxMap);
    });
  }

  if (editId) {
    var el = document.getElementById('editQty');
    if (el) el.focus();
  }
}

initPortfolios();
loadLocal();
document.getElementById('portfolioTitle').textContent = currentPortfolio().name;
showKeyStatus();
render();
cloudLoad(function(loaded) {
  if (loaded) render();
  if (getApiKey()) refreshAll();
});
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').then(function(reg) {
      console.log('SW registered:', reg.scope);
    }).catch(function(e) {
      console.log('SW error:', e);
    });
  });
}
</script>
</body>
